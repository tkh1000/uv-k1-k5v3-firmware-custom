name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      preset:
        description: 'CMake preset to build'
        required: false
        default: 'Fusion'
        type: choice
        options:
          - Fusion
          - Custom
          - Bandscope
          - Broadcast
          - Basic
          - RescueOps
          - Game

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: uvk1-uvk5v3:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Determine preset
        id: preset
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.preset }}" >> $GITHUB_OUTPUT
          else
            echo "name=Fusion" >> $GITHUB_OUTPUT
          fi

      - name: Build firmware
        run: |
          PRESET="${{ steps.preset.outputs.name }}"
          echo "Building preset: $PRESET"
          rm -rf build
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            uvk1-uvk5v3:latest \
            bash -c "
              set -e
              which arm-none-eabi-gcc
              arm-none-eabi-gcc --version
              cmake --preset ${PRESET}
              cmake --build --preset ${PRESET} -j$(nproc)
            "

      - name: List build artifacts
        run: find build -name "*.bin" -o -name "*.hex" -o -name "*.elf" | sort

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.preset.outputs.name }}-${{ github.sha }}
          path: |
            build/${{ steps.preset.outputs.name }}/*.bin
            build/${{ steps.preset.outputs.name }}/*.hex
          if-no-files-found: error
          retention-days: 30
